version: 2

sources:
  - name: raw
    schema: gz_raw_data
    description: Greenweez raw data stored in BigQuery
    tables:
      - name: sales
        identifier: raw_gz_sales
        description: Sales transactions
        columns:
          - name: date_date
          - name: orders_id
          - name: pdt_id
        tests:
          - unique:
              column_name: "concat(orders_id, '-', pdt_id)"
          - not_null:
              column_name: "concat(orders_id, '-', pdt_id)"

      - name: product
        identifier: raw_gz_product
        columns:
          - name: products_id
            tests:
              - unique
              - not_null

      - name: ship
        identifier: raw_gz_ship
        columns:
          - name: orders_id
            tests:
              - unique
              - not_null